[package]
name = "lmm"
version = "0.0.1"
edition = "2024"
authors = ["Mahmoud Harmouch <oss@wiseai.dev>"]
license = "MIT"
description = "WIP: A language agnostic framework to reality."

[dependencies]
thiserror = "2.0.18"
serde_json = "1.0.149"
anyhow = "1.0.102"
rand = "0.10.0"
clap = { version = "4.6.0", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.51.1", features = ["full"] }

[[bin]]
name = "lmm"
path = "src/bin/lmm.rs"
